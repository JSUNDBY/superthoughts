<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Quantum Reset | Superthoughts</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23050510'/><text x='50' y='72' font-family='Georgia,serif' font-size='68' font-weight='400' font-style='italic' fill='%2300dcff' text-anchor='middle'>S</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #050510;
      color: #fff;
      font-family: 'Source Sans 3', sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .display { font-family: 'Libre Baskerville', serif; }
    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: opacity 2s ease;
    }
    .screen.hidden { display: none !important; }
    #intro { cursor: pointer; }
    #intro .brand {
      color: rgba(0, 220, 255, 0.3);
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    #intro h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 0.04em;
      margin-bottom: 0.75rem;
      text-align: center;
    }
    #intro .sub {
      color: rgba(255, 255, 255, 0.25);
      font-size: 1rem;
      margin-bottom: 4rem;
    }
    .play-circle {
      width: 4rem;
      height: 4rem;
      border-radius: 50%;
      border: 1px solid rgba(0, 220, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.7s ease;
    }
    .play-circle:hover {
      border-color: rgba(0, 220, 255, 0.4);
      box-shadow: 0 0 40px rgba(0, 220, 255, 0.1);
    }
    .play-circle svg { color: rgba(0, 200, 255, 0.6); margin-left: 2px; }
    #intro .hint {
      color: rgba(255, 255, 255, 0.12);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 1.25rem;
    }
    #playing-ui .title {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.04em;
      margin-bottom: 0.75rem;
      text-align: center;
    }
    #playing-ui .message {
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.875rem;
    }
    #pause-wrap {
      position: fixed;
      bottom: 2.5rem;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      z-index: 15;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    #pause-wrap.visible { opacity: 1; }
    #pause-btn {
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      pointer-events: auto;
      color: rgba(255, 255, 255, 0.3);
      transition: all 0.5s ease;
    }
    #pause-btn:hover { color: rgba(255, 255, 255, 0.5); border-color: rgba(255, 255, 255, 0.2); }
    #paused { cursor: pointer; }
    #paused .label {
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    #paused h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.04em;
      margin-bottom: 2.5rem;
      text-align: center;
    }
    #paused .resume-circle {
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 50%;
      border: 1px solid rgba(0, 220, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #paused .resume-circle svg { color: rgba(0, 200, 255, 0.4); margin-left: 2px; }
    #paused .hint {
      color: rgba(255, 255, 255, 0.1);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 1rem;
    }
    #ended { animation: fadeIn 3s ease forwards; }
    #ended .label {
      color: rgba(255, 255, 255, 0.25);
      font-size: 0.875rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    #ended h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.04em;
      margin-bottom: 3rem;
      text-align: center;
    }
    #ended button {
      padding: 0.625rem 2rem;
      border-radius: 9999px;
      border: 1px solid rgba(0, 220, 255, 0.15);
      background: none;
      color: rgba(0, 200, 255, 0.4);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.7s ease;
    }
    #ended button:hover { color: rgba(0, 200, 255, 0.7); border-color: rgba(0, 220, 255, 0.3); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <audio id="audio" src="https://superthoughts-audio.b-cdn.net/quantum-reset/the-quantum-reset.mp3" preload="auto" crossorigin="anonymous"></audio>
  <canvas id="canvas"></canvas>

  <div id="intro" class="screen" onclick="beginSession()">
    <div class="brand">Superthoughts</div>
    <h1 class="display">The Quantum Reset</h1>
    <div class="sub">25-minute guided session</div>
    <div class="play-circle">
      <svg width="18" height="22" viewBox="0 0 18 22" fill="none"><path d="M2 1.5L16 11L2 20.5V1.5Z" fill="currentColor"/></svg>
    </div>
    <div class="hint">Tap to begin</div>
  </div>

  <div id="playing-ui" class="screen hidden">
    <h1 class="display title">The Quantum Reset</h1>
    <div class="message">Find a comfortable position and close your eyes</div>
  </div>

  <div id="tap-zone" class="screen hidden" style="background:none" onclick="revealPause()"></div>

  <div id="pause-wrap">
    <button id="pause-btn" onclick="event.stopPropagation(); togglePause()" aria-label="Pause">
      <svg width="14" height="16" viewBox="0 0 14 16" fill="currentColor"><rect x="1" y="1" width="4" height="14" rx="1"/><rect x="9" y="1" width="4" height="14" rx="1"/></svg>
    </button>
  </div>

  <div id="paused" class="screen hidden" onclick="togglePause()">
    <div class="label">Paused</div>
    <h1 class="display">The Quantum Reset</h1>
    <div class="resume-circle">
      <svg width="16" height="20" viewBox="0 0 16 20" fill="none"><path d="M2 1.5L14 10L2 18.5V1.5Z" fill="currentColor"/></svg>
    </div>
    <div class="hint">Tap to resume</div>
  </div>

  <div id="ended" class="screen hidden">
    <div class="label">Session complete</div>
    <h1 class="display">The Quantum Reset</h1>
    <button onclick="replay()">Listen Again</button>
  </div>

  <script>
    const audio = document.getElementById('audio');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let audioCtx, analyser, wakeLock;
    let phase = 'intro';
    let controlsTimer = null;
    let fadeTimers = [];

    // Particles
    const particles = [];
    (function() {
      const cx = 0.5, cy = 0.45;
      for (let i = 0; i < 70; i++) {
        const a = (i / 70) * Math.PI * 2, r = 0.07 + Math.random() * 0.05;
        particles.push({ x:0, y:0, bx: cx+Math.cos(a)*r, by: cy+Math.sin(a)*r,
          sz: Math.random()*1.4+0.5, ph: a, sp: 0.00015+Math.random()*0.00025,
          or: r, hue: 180+Math.random()*40, op: Math.random()*0.5+0.3 });
      }
      for (let i = 0; i < 100; i++) {
        const a = (i / 100) * Math.PI * 2, r = 0.15 + Math.random() * 0.12;
        particles.push({ x:0, y:0, bx: cx+Math.cos(a)*r, by: cy+Math.sin(a)*r,
          sz: Math.random()*1.0+0.3, ph: a+Math.random(), sp: 0.00006+Math.random()*0.00015,
          or: r, hue: 250+Math.random()*50, op: Math.random()*0.35+0.15 });
      }
      for (let i = 0; i < 50; i++) {
        particles.push({ x:0, y:0, bx: Math.random(), by: Math.random(),
          sz: Math.random()*0.7+0.2, ph: Math.random()*Math.PI*2,
          sp: 0.00003+Math.random()*0.00006, or: 0.015+Math.random()*0.03,
          hue: 180+Math.random()*100, op: Math.random()*0.2+0.08 });
      }
    })();

    // Canvas
    const dpr = window.devicePixelRatio || 1;
    function resize() {
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    function draw() {
      const w = window.innerWidth, h = window.innerHeight;
      ctx.clearRect(0, 0, w, h);
      const now = Date.now();

      let bass = 0, mid = 0, high = 0;
      if (analyser) {
        const fd = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(fd);
        const bc = fd.length;
        for (let i = 0; i < bc/6; i++) bass += fd[i];
        bass /= bc/6;
        for (let i = Math.floor(bc/6); i < bc/3; i++) mid += fd[i];
        mid /= bc/6;
        for (let i = Math.floor(bc/3); i < (bc*2)/3; i++) high += fd[i];
        high /= bc/3;
        bass /= 255; mid /= 255; high /= 255;
      }

      const amplitude = (bass + mid + high) / 3;
      const cx = w * 0.5, cy = h * 0.45;
      const breath = Math.sin(now * 0.0004) * 0.5 + 0.5;
      const energy = Math.max(amplitude, breath * 0.15);

      const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, w * 0.55);
      bg.addColorStop(0, 'rgba(0,200,255,' + (0.02 + energy * 0.025) + ')');
      bg.addColorStop(0.25, 'rgba(100,30,180,' + (0.012 + energy * 0.015) + ')');
      bg.addColorStop(0.5, 'rgba(0,150,255,0.004)');
      bg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      const cr = Math.min(w, h) * (0.05 + energy * 0.035);
      const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, cr * 3.5);
      cg.addColorStop(0, 'rgba(0,230,255,' + (0.1 + energy * 0.12) + ')');
      cg.addColorStop(0.25, 'rgba(80,50,240,' + (0.06 + energy * 0.06) + ')');
      cg.addColorStop(0.6, 'rgba(160,0,255,' + (0.015 + bass * 0.025) + ')');
      cg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.arc(cx, cy, cr * 3.5, 0, Math.PI * 2);
      ctx.fill();

      for (let r = 0; r < 5; r++) {
        const rp = (now * 0.00018 + r * 1.2) % (Math.PI * 2);
        const rr = cr * (1.8 + r * 1.4 + Math.sin(rp) * 0.4);
        const ra = (0.04 - r * 0.007 + mid * 0.03) * (1 - (r / 5) * 0.6);
        if (ra <= 0) continue;
        ctx.beginPath();
        ctx.arc(cx, cy, rr, 0, Math.PI * 2);
        ctx.strokeStyle = 'hsla(' + (190 + r * 20) + ',100%,70%,' + ra + ')';
        ctx.lineWidth = 0.4 + energy * 0.5;
        ctx.stroke();
      }

      for (const p of particles) {
        const t = now * p.sp + p.ph;
        const wm = 1 + energy * 0.3;
        const px = (p.bx + Math.cos(t) * p.or * 0.25 * wm) * w;
        const py = (p.by + Math.sin(t * 1.2) * p.or * 0.25 * wm) * h;
        p.x = px; p.y = py;
        const tw = Math.sin(now * 0.0015 + p.ph) * 0.3 + 0.7;
        const al = p.op * tw * (0.6 + energy * 0.4);
        const sz = p.sz * (1 + energy * 0.4);
        ctx.shadowBlur = 4 + energy * 6;
        ctx.shadowColor = 'hsla(' + p.hue + ',100%,70%,0.4)';
        ctx.beginPath();
        ctx.arc(px, py, sz, 0, Math.PI * 2);
        ctx.fillStyle = 'hsla(' + p.hue + ',85%,72%,' + al + ')';
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      ctx.lineWidth = 0.25;
      for (let i = 0; i < 70; i++) {
        for (let j = i + 1; j < 70; j++) {
          const a = particles[i], b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d = Math.sqrt(dx*dx + dy*dy);
          const th = 50 + energy * 30;
          if (d < th) {
            const la = (1 - d/th) * 0.1 * (0.4 + energy * 0.4);
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = 'hsla(200,100%,80%,' + la + ')';
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    var allScreens = ['intro', 'playing-ui', 'tap-zone', 'paused', 'ended'];
    function hideAll() {
      allScreens.forEach(function(id) { document.getElementById(id).classList.add('hidden'); });
      document.getElementById('pause-wrap').classList.remove('visible');
    }
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }

    function goFullscreen() {
      try {
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen().catch(function(){});
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      } catch(e) {}
    }

    async function requestWakeLock() {
      try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    }

    function releaseWakeLock() {
      if (wakeLock) { wakeLock.release().catch(function(){}); wakeLock = null; }
    }

    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible' && phase === 'playing' && !wakeLock) requestWakeLock();
    });

    function setupMediaSession() {
      if (!('mediaSession' in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: 'The Quantum Reset', artist: 'Superthoughts', album: 'Guided Sessions'
      });
      navigator.mediaSession.setActionHandler('play', function() { audio.play(); phase = 'playing'; });
      navigator.mediaSession.setActionHandler('pause', function() { audio.pause(); phase = 'paused'; });
      navigator.mediaSession.setActionHandler('stop', function() { audio.pause(); audio.currentTime = 0; showEnded(); });
    }

    function clearFadeTimers() { fadeTimers.forEach(clearTimeout); fadeTimers = []; }

    function fadeOutUI() {
      clearFadeTimers();
      var ui = document.getElementById('playing-ui');
      show('playing-ui');
      ui.style.opacity = '1';
      fadeTimers.push(
        setTimeout(function() { ui.style.opacity = '0.6'; }, 500),
        setTimeout(function() { ui.style.opacity = '0.2'; }, 1500),
        setTimeout(function() { ui.style.opacity = '0'; hide('playing-ui'); }, 3500)
      );
    }

    function beginSession() {
      if (!audioCtx) {
        audioCtx = new AudioContext();
        var src = audioCtx.createMediaElementSource(audio);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;
        analyser.smoothingTimeConstant = 0.85;
        src.connect(analyser);
        analyser.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      audio.play();
      phase = 'playing';
      hideAll();
      show('tap-zone');
      fadeOutUI();
      goFullscreen();
      requestWakeLock();
      setupMediaSession();
    }

    function revealPause() {
      if (phase !== 'playing') return;
      var wrap = document.getElementById('pause-wrap');
      wrap.classList.add('visible');
      if (controlsTimer) clearTimeout(controlsTimer);
      controlsTimer = setTimeout(function() { wrap.classList.remove('visible'); }, 4000);
    }

    function togglePause() {
      if (phase === 'playing') {
        audio.pause();
        phase = 'paused';
        clearFadeTimers();
        hideAll();
        show('paused');
        releaseWakeLock();
      } else if (phase === 'paused') {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        audio.play();
        phase = 'playing';
        hideAll();
        show('tap-zone');
        fadeOutUI();
        requestWakeLock();
      }
    }

    function showEnded() {
      phase = 'ended';
      clearFadeTimers();
      hideAll();
      show('ended');
      releaseWakeLock();
      if (document.fullscreenElement) document.exitFullscreen().catch(function(){});
    }

    function replay() { audio.currentTime = 0; beginSession(); }

    audio.addEventListener('ended', function() {
      // Only show ended screen if we were actually playing
      if (phase === 'playing') showEnded();
    });
  </script>
</body>
</html>
